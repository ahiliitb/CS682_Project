<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registration Page - CampusConnect</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; }
        .card { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { margin: 0 0 1.5rem; color: #1a1a1a; font-size: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.35rem; font-weight: 500; color: #333; }
        input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: #1877f2; }
        button { width: 100%; padding: 0.75rem; background: #1877f2; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #166fe5; }
        .message { padding: 0.6rem; border-radius: 8px; margin-bottom: 1rem; }
        .error { background: #fee; color: #c00; }
        .success { background: #efe; color: #060; }
        .link { text-align: center; margin-top: 1.25rem; }
        .link a { color: #1877f2; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Registration Page</h2>
        <p th:if="${message}" class="message success" th:text="${message}"></p>
        <p th:if="${error}" class="message error" th:text="${error}"></p>
        <form th:action="@{/signup}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="4" autocomplete="new-password" placeholder="At least 4 characters">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required minlength="4" autocomplete="new-password" placeholder="Repeat password">
            </div>
            <button type="submit">Register</button>
        </form>
        <p class="link">Already have an account? <a th:href="@{/login}">Log in</a></p>
        <p class="link"><a th:href="@{/}">Back to home</a></p>
    </div>
</body>
</html>
