<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SSO Login - CampusCart</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f0f2f5; }
        .card { background: #fff; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 100%; max-width: 440px; }
        h2 { margin: 0 0 1.2rem; color: #1a1a1a; font-size: 1.5rem; }
        p { color: #59607a; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.35rem; font-weight: 500; color: #333; }
        input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
        input:focus { outline: none; border-color: #1877f2; }
        button { width: 100%; padding: 0.75rem; background: #1877f2; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        button:hover { background: #166fe5; }
        .message { padding: 0.6rem; border-radius: 8px; margin-bottom: 1rem; }
        .error { background: #fee; color: #c00; }
        .link { text-align: center; margin-top: 1rem; }
        .link a { color: #1877f2; text-decoration: none; font-weight: 500; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Campus SSO Login</h2>
        <p>Use your IITB email and SSO code provided by campus identity service/admin.</p>
        <p th:if="${error}" class="message error" th:text="${error}"></p>
        <form th:action="@{/sso-login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="form-group">
                <label for="email">IITB Email</label>
                <input type="email" id="email" name="email" required placeholder="you@iitb.ac.in">
            </div>
            <div class="form-group">
                <label for="ssoCode">SSO Code</label>
                <input type="password" id="ssoCode" name="ssoCode" required placeholder="Campus SSO code">
            </div>
            <button type="submit">Log in with SSO</button>
        </form>
        <p class="link"><a th:href="@{/login}">Back to username/password login</a></p>
    </div>
</body>
</html>
