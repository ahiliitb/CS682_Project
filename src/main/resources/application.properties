spring.application.name=final_project
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.item-upload.dir=uploads/item-images
# Use H2 for local run without MySQL (use profile 'mysql' for MySQL)
spring.datasource.url=jdbc:h2:file:./data/campusconnect-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.docker.compose.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep login sessions in DB so auth survives browser refresh and app restarts.
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=7d

# Demo SSO and role controls.
app.sso.code-ttl-minutes=15
app.security.admin-emails=22b0919@iitb.ac.in