spring.application.name=final_project
# Use H2 for local run without MySQL (use profile 'mysql' for MySQL)
spring.datasource.url=jdbc:h2:file:./data/campusconnect-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.docker.compose.enabled=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Keep login sessions in DB so auth survives browser refresh and app restarts.
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=7d

# Demo SSO and role controls.
app.sso.shared-code=IITB-SSO-DEMO
app.security.admin-emails=

# Optional SMTP settings for email notifications (safe defaults).
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true