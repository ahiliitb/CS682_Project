services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: MySQLlogin@123
      MYSQL_DATABASE: CampusConnect
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
