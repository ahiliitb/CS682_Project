# IIT Bombay public homepage — "Latest News" block (update selectors if the site layout changes)
url: "https://www.iitb.ac.in/"
# Scope to the news carousel/grid only (not the announcements list)
container_selector: ".homepage-news"
item_selector: ".views-row"
title_selector: ".news-card-title"
url_selector: ".news-card-more a"
date_selector: ".news-card-date time"
max_items: 10
output_relative: "../../src/main/resources/static/data/iitb-highlights.json"
